# Findora Backend - Spring Boot Configuration
# Replace placeholders with your actual values

# ============================================================================
# SERVER CONFIGURATION
# ============================================================================
server.port=8080
server.servlet.context-path=/
spring.application.name=findora-backend

# ============================================================================
# DATABASE CONFIGURATION
# ============================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/findora_db?serverTimezone=Asia/Colombo&useSSL=false
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================================================
# JWT CONFIGURATION
# ============================================================================
app.jwt.secret=your-super-secret-jwt-key-min-32-characters-long-change-this
app.jwt.expiration.ms=86400000

# ============================================================================
# EMAIL CONFIGURATION (OTP, notifications)
# ============================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ============================================================================
# LOGGING
# ============================================================================
logging.level.root=INFO
logging.level.com.findora=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# ============================================================================
# FILE UPLOAD
# ============================================================================
app.upload.dir=uploads/
app.upload.max-size=5242880

# ============================================================================
# OTP CONFIGURATION
# ============================================================================
app.otp.expiration.minutes=24
app.otp.length=6

# ============================================================================
# MATCHING ALGORITHM THRESHOLDS
# ============================================================================
# Score >= 80% -> "Item Found" notification
# Score >= 60% -> "Possible Match" notification
app.matching.threshold.found=0.80
app.matching.threshold.possible=0.60
# Weight factors for matching (must sum to 1.0):
# name: 40%, description: 30%, location: 20%, date: 10%
app.matching.weight.name=0.40
app.matching.weight.description=0.30
app.matching.weight.location=0.20
app.matching.weight.date=0.10
